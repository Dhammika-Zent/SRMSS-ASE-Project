<style>
    /* ============================================================
       ROUTEX TRANSIT — INLINE STATIC FOOTER (letter reveal, slower)
       ============================================================ */
    .routex-footer {
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(64px) saturate(250%);
        -webkit-backdrop-filter: blur(64px) saturate(250%);
        border-top: var(--border-subtle, 1px solid rgba(108, 34, 245, 0.08));
        box-shadow: 0 0 16px rgba(79, 124, 255, 0.15),
            0 0 30px rgba(108, 34, 245, 0.08);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2.5rem 2rem 2rem;
        box-sizing: border-box;
        overflow: hidden;
        position: relative;
        border-radius: 0 0 var(--radius, 24px) var(--radius, 24px);
        margin-top: 1.5rem;
    }

    .routex-footer-glow {
        position: absolute;
        width: 500px;
        height: 120px;
        background: radial-gradient(ellipse at center,
                rgba(79, 124, 255, 0.15) 0%,
                rgba(108, 34, 245, 0) 70%);
        bottom: -20px;
        pointer-events: none;
        animation: rfGlowPulse 4s ease-in-out infinite alternate;
    }

    @keyframes rfGlowPulse {
        0% {
            transform: scale(1);
            opacity: 0.6;
        }

        100% {
            transform: scale(1.15);
            opacity: 1;
        }
    }

    /* Logo wrapper */
    .routex-footer-logo {
        font-family: 'Outfit', sans-serif;
        font-size: 5rem;
        font-weight: 700;
        letter-spacing: -1.5px;
        background: linear-gradient(135deg,
                var(--accent-soft, #4f7cff), #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 15px rgba(79, 124, 255, 0.35)) drop-shadow(0 0 30px rgba(108, 34, 245, 0.15));
        margin: 0 0 0.5rem;
        line-height: 1;
        user-select: none;
        position: relative;
        z-index: 1;
        display: inline-block;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .routex-footer-logo:hover {
        transform: scale(1.04);
        filter: drop-shadow(0 0 20px rgba(79, 124, 255, 0.5)) drop-shadow(0 0 35px rgba(108, 34, 245, 0.25));
    }

    /* Individual letters — slower animation (0.8s instead of 0.6s) */
    .routex-footer-logo .letter {
        display: inline-block;
        opacity: 0;
        transform: translateY(1em) rotateX(-90deg);
        filter: blur(2px);
        background: inherit;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: letterReveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        animation-play-state: paused;
    }

    .routex-footer-logo.reveal .letter {
        animation-play-state: running;
    }

    @keyframes letterReveal {
        0% {
            opacity: 0;
            transform: translateY(1em) rotateX(-90deg);
            filter: blur(2px);
        }

        100% {
            opacity: 1;
            transform: translateY(0) rotateX(0);
            filter: blur(0);
        }
    }

    /* Slightly wider stagger (0.1s steps) for a slower, smoother cascade */
    .routex-footer-logo .letter:nth-child(1) {
        animation-delay: 0s;
    }

    .routex-footer-logo .letter:nth-child(2) {
        animation-delay: 0.1s;
    }

    .routex-footer-logo .letter:nth-child(3) {
        animation-delay: 0.2s;
    }

    .routex-footer-logo .letter:nth-child(4) {
        animation-delay: 0.3s;
    }

    .routex-footer-logo .letter:nth-child(5) {
        animation-delay: 0.4s;
    }

    .routex-footer-logo .letter:nth-child(6) {
        animation-delay: 0.5s;
    }

    /* Copyright */
    .routex-footer-copy {
        color: var(--text-soft, #18182c);
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        opacity: 0.75;
        text-align: center;
        position: relative;
        z-index: 1;
        margin: 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
        .routex-footer-logo {
            font-size: 3.5rem;
            letter-spacing: -1px;
        }

        .routex-footer-copy {
            font-size: 0.8rem;
        }

        .routex-footer {
            padding: 2rem 1.5rem 1.5rem;
            margin-top: 1rem;
        }
    }
</style>

<footer class="routex-footer">
    <div class="routex-footer-glow"></div>
    <h2 class="routex-footer-logo" id="routexLogo">RouteX</h2>
    <p class="routex-footer-copy">&copy; 2026 RouteX Transit. All rights reserved.</p>
</footer>

<script>
    (function () {
        const logo = document.getElementById('routexLogo');
        if (!logo) return;

        // Split text into letters, each wrapped in a <span class="letter">
        const text = logo.textContent.trim();
        logo.innerHTML = '';
        [...text].forEach(char => {
            const span = document.createElement('span');
            span.className = 'letter';
            span.textContent = char;
            logo.appendChild(span);
        });

        // Start animation once footer scrolls into view
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    logo.classList.add('reveal');
                    observer.unobserve(logo); // animate only once
                }
            });
        }, { threshold: 0.2 });

        observer.observe(logo);
    })();
</script>
