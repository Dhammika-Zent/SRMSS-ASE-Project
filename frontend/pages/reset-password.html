<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteX Transit — Set New Password</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reset-password.css">
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <main class="glass-card reset-card" aria-labelledby="reset-heading" data-aos="fade-up" data-aos-duration="800">
        <div class="logo-container" data-aos="fade-down" data-aos-delay="100">
            <span class="logo-text">RouteX</span>
        </div>
        <h1 id="reset-heading" class="card-title" data-aos="fade-up" data-aos-delay="150">Create New Password</h1>
        <p class="card-subtitle" data-aos="fade-up" data-aos-delay="200">
            Hi <span id="resetUserName">User</span> (<span id="resetUserRole">role</span>) — your password must be
            changed before you continue.
        </p>

        <!-- CHANGED: Added class="login-form" to inherit proper spacing -->
        <form id="resetPasswordForm" class="login-form" novalidate>
            <!-- New Password -->
            <div class="input-group" data-aos="fade-up" data-aos-delay="250">
                <label for="newPassword" class="input-label">New Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                        <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                    <input type="password" id="newPassword" class="glass-input" placeholder="Min. 8 characters"
                        autocomplete="new-password" required minlength="8">
                    <button type="button" id="toggleNewPassword" class="toggle-password" aria-label="Show password">
                        <svg class="eye-open" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5" />
                            <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" />
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" />
                            <line x1="3" y1="3" x2="17" y2="17" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div id="newPasswordHint" class="password-hint">Use 8+ characters with upper, lower & number</div>
            </div>

            <!-- Confirm Password -->
            <div class="input-group" data-aos="fade-up" data-aos-delay="300">
                <label for="confirmPassword" class="input-label">Confirm Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                        <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5" />
                        <path d="M8 15l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    <input type="password" id="confirmPassword" class="glass-input" placeholder="Re-enter password"
                        autocomplete="new-password" required>
                    <button type="button" id="toggleConfirmPassword" class="toggle-password" aria-label="Show password">
                        <svg class="eye-open" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5" />
                            <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" />
                        </svg>
                        <svg class="eye-closed" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                            <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" />
                            <line x1="3" y1="3" x2="17" y2="17" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="resetErrorMessage" class="error-message" role="alert" aria-live="polite"></div>
            <!-- Success Message -->
            <div id="resetSuccessMessage" class="success-message" role="alert" aria-live="polite"></div>

            <button type="submit" id="resetButton" class="login-button" data-aos="fade-up" data-aos-delay="400">
                <span class="btn-text">Update Password</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>
        </form>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/app.js"></script>
    <script type="module" src="../js/reset-password.js"></script>
</body>

</html>
